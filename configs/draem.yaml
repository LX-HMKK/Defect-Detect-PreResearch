# ================================================================================
# 算法 3: DRAEM (基于自监督学习) - Anomalib 2.x 配置
# ================================================================================
# 原理: 在训练阶段通过数据增强生成合成异常样本，训练一个判别网络
#       来学习区分正常区域和异常区域。无需真实异常样本即可训练。
#
# 特点: 无需真实异常样本，对小缺陷检测效果较好
# ================================================================================

# 数据配置 (Anomalib 2.x 格式)
data:
  class_path: anomalib.data.MVTec
  init_args:
    root: ./data/processed
    category: my_product
    image_size: [256, 256]
    train_batch_size: 4  # DRAEM 显存占用大，batch_size 设小
    eval_batch_size: 4
    num_workers: 0  # Windows 设为 0 避免多进程问题

# 模型配置 (Anomalib 2.x 格式)
model:
  class_path: anomalib.models.Draem
  init_args:
    # DRAEM 使用默认参数

# 优化器配置
optimization:
  optimizer:
    class_path: torch.optim.Adam
    init_args:
      lr: 0.0001
      weight_decay: 0.00001

# 归一化配置
normalization:
  normalization_method: min_max

# 必须输出的 4 个硬性指标
metrics:
  image:
    - AUROC                           # 图像级 AUROC
    - AUPR                            # 图像级 AUPR
  pixel:
    - AUROC                           # 像素级 AUROC
    - PRO                             # Per-Region Overlap
  threshold:
    class_path: anomalib.metrics.F1AdaptiveThreshold
    init_args:
      default_value: 0.5

# 可视化配置
visualization:
  show_images: false
  save_images: true
  log_images: true

# 项目配置
project:
  seed: 42
  path: ./results
  default_root_dir: results/draem

# 训练器配置
trainer:
  max_epochs: 100                      # 需要训练 100 个 epoch
  accelerator: auto
  devices: 1
  check_val_every_n_epoch: 20          # 每 20 个 epoch 验证一次
  enable_progress_bar: true
  default_root_dir: results/draem
  gradient_clip_val: 0
  num_sanity_val_steps: 0
  limit_val_batches: 0

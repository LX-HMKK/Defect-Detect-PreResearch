# ================================================================================
# 算法: Ganomaly (基于重构 - GAN) - Anomalib 2.x 配置
# ================================================================================
# 原理: 训练GAN学习正常样本分布，异常样本无法良好重构。
#       通过重构误差检测异常。
#
# 特点: 经典重构方法升级版，基于GAN实现
# ================================================================================

# 数据配置 (Anomalib 2.x 格式)
data:
  class_path: anomalib.data.MVTec
  init_args:
    root: ./data
    category: bottle
    train_batch_size: 16         # 与 model.batch_size 一致
    eval_batch_size: 16
    num_workers: 0             # Windows 设为 0 避免多进程问题

# 模型配置 (Anomalib 2.x 格式)
# 优化后的参数（基于论文推荐 + 实验验证）
model:
  class_path: anomalib.models.Ganomaly
  init_args:
    batch_size: 16              # 与原始实验一致，GAN需要较小batch
    n_features: 32              # 减小特征维度加快训练(47.9M参数 vs 188M)
    latent_vec_size: 64        # 减小潜在空间
    extra_layers: 0             # 不增加额外层
    add_final_conv_layer: true  # 是否添加最终卷积层
    wadv: 1.0                  # Adversarial loss 权重（论文推荐）
    wcon: 50.0                 # Contextual loss 权重（论文推荐，高权重强制关注重构）
    wenc: 1.0                  # Encoding loss 权重（论文推荐）
    lr: 0.0002                 # 学习率（论文推荐，不要用0.002）
    beta1: 0.5                 # Adam beta1
    beta2: 0.999               # Adam beta2

# 优化器配置
optimization:
  export_mode: null

# 归一化配置
normalization:
  normalization_method: min_max

# 指标配置
metrics:
  image:
    - F1Score
    - AUROC
    - AUPR
  pixel:
    - F1Score
    - AUROC
  threshold:
    class_path: anomalib.metrics.F1AdaptiveThreshold
    init_args:
      default_value: 0.5

# 可视化配置
visualization:
  show_images: false
  save_images: true
  log_images: true
  image_save_path: null
  mode: full

# 项目配置
project:
  seed: 42
  path: ./results
  unique_dir: false

# 日志配置
logging:
  logger: []
  log_graph: false

# 训练器配置
trainer:
  enable_checkpointing: true
  default_root_dir: results/ganomaly
  gradient_clip_val: 0
  gradient_clip_algorithm: norm
  num_nodes: 1
  devices: 1
  enable_progress_bar: true
  overfit_batches: 0.0
  track_grad_norm: -1
  check_val_every_n_epoch: 5     # 每5轮验证一次（观察收敛）
  fast_dev_run: false
  accumulate_grad_batches: 1
  max_epochs: 100                # 论文推荐训练轮次
  min_epochs: null
  max_steps: -1
  min_steps: null
  max_time: null
  limit_train_batches: 1.0
  limit_val_batches: 0
  limit_test_batches: 1.0
  limit_predict_batches: 1.0
  val_check_interval: 5         # 与 check_val_every_n_epoch 保持一致
  log_every_n_steps: 50
  accelerator: auto
  strategy: null
  sync_batchnorm: false
  num_sanity_val_steps: 0

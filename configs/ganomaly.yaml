# ================================================================================
# 算法: Ganomaly (基于重构 - GAN) - Anomalib 2.x 配置
# ================================================================================
# 原理: 训练GAN学习正常样本分布，异常样本无法良好重构。
#       通过重构误差检测异常。
#
# 特点: 经典重构方法升级版，基于GAN实现
# ================================================================================

# 数据配置 (Anomalib 2.x 格式)
data:
  class_path: anomalib.data.MVTec
  init_args:
    root: ./data/processed
    category: my_product
    train_batch_size: 8
    eval_batch_size: 8
    num_workers: 0  # Windows 设为 0 避免多进程问题

# 模型配置 (Anomalib 2.x 格式)
model:
  class_path: anomalib.models.Ganomaly
  init_args:
    batch_size: 8
    n_features: 128
    latent_vec_size: 100
    extra_layers: 0
    add_final_conv_layer: true
    wadv: 1.0
    wcon: 50.0
    wenc: 1.0
    lr: 0.001
    beta1: 0.5
    beta2: 0.999

# 优化器配置
optimization:
  export_mode: null

# 归一化配置
normalization:
  normalization_method: min_max

# 指标配置
metrics:
  image:
    - F1Score
    - AUROC
    - AUPR
  pixel:
    - F1Score
    - AUROC
  threshold:
    class_path: anomalib.metrics.F1AdaptiveThreshold
    init_args:
      default_value: 0.5

# 可视化配置
visualization:
  show_images: false
  save_images: true
  log_images: true
  image_save_path: null
  mode: full

# 项目配置
project:
  seed: 42
  path: ./results
  unique_dir: false

# 日志配置
logging:
  logger: []
  log_graph: false

# 训练器配置
trainer:
  enable_checkpointing: true
  default_root_dir: results/ganomaly
  gradient_clip_val: 0
  gradient_clip_algorithm: norm
  num_nodes: 1
  devices: 1
  enable_progress_bar: true
  overfit_batches: 0.0
  track_grad_norm: -1
  check_val_every_n_epoch: 999
  fast_dev_run: false
  accumulate_grad_batches: 1
  max_epochs: 100
  min_epochs: null
  max_steps: -1
  min_steps: null
  max_time: null
  limit_train_batches: 1.0
  limit_val_batches: 0
  limit_test_batches: 1.0
  limit_predict_batches: 1.0
  val_check_interval: 999
  log_every_n_steps: 50
  accelerator: auto
  strategy: null
  sync_batchnorm: false
  num_sanity_val_steps: 0

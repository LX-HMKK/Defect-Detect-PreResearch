# ================================================================================
# 算法 2: PatchCore (基于特征建模)
# ================================================================================
# 原理: 使用预训练 CNN 提取局部特征，构建记忆库存储正常样本特征。
#       测试时通过计算测试样本特征与记忆库的最近邻距离来判断异常。
#
# 特点: 工业界目前效果最好的方法，无需训练，推理速度最快
# ================================================================================

# ================================================================================
# 运行配置（直接运行 python run_training.py 时使用此配置）
# ================================================================================
run:
  model: patchcore                      # 模型名称
  data_path: ./data                     # 数据目录路径
  category: region5                     # 产品类别名称
  device: cuda                          # 计算设备 (auto/cpu/cuda)
  output_dir: ./results                 # 输出目录

dataset:
  name: mvtec
  format: mvtec
  path: ./data
  category: region5
  task: segmentation
  train_batch_size: 32
  eval_batch_size: 32
  num_workers: 8
  image_size:
    - 256
    - 256
  center_crop:
    - 224
    - 224
  normalization: imagenet
  transform_config:
    train: null
    eval: null
  test_split_mode: from_dir
  test_split_ratio: 0.2
  val_split_mode: same_as_test
  val_split_ratio: 0.5
  tiling:
    apply: false
    tile_size: null
    stride: null
    remove_border_count: 0
    use_random_tiling: false
    random_tile_count: 16

model:
  name: patchcore
  backbone: wide_resnet50_2
  pre_trained: true
  layers:
    - layer2
    - layer3
  coreset_sampling_ratio: 0.1
  num_neighbors: 9
  normalization_method: min_max
  input_size:
    - 224
    - 224

metrics:
  image:
    - F1Score
    - AUROC
  pixel:
    - F1Score
    - AUROC
  threshold:
    method: adaptive
    manual_image: null
    manual_pixel: null

visualization:
  show_images: false
  save_images: false
  log_images: false
  image_save_path: null
  mode: full

project:
  seed: 0
  path: ./results
  unique_dir: false

logging:
  logger: []
  log_graph: false

optimization:
  export_mode: null

trainer:
  enable_checkpointing: true
  default_root_dir: results/patchcore
  gradient_clip_val: 0
  gradient_clip_algorithm: norm
  num_nodes: 1
  devices: 1
  enable_progress_bar: true
  overfit_batches: 0.0
  track_grad_norm: -1
  check_val_every_n_epoch: 999
  fast_dev_run: false
  accumulate_grad_batches: 1
  max_epochs: 1
  min_epochs: null
  max_steps: -1
  min_steps: null
  max_time: null
  limit_train_batches: 1.0
  limit_val_batches: 0
  limit_test_batches: 1.0
  limit_predict_batches: 1.0
  val_check_interval: 999
  log_every_n_steps: 50
  accelerator: auto
  strategy: null
  sync_batchnorm: false
  num_sanity_val_steps: 0

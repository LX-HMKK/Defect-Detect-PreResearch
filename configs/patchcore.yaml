# ================================================================================
# 算法 2: PatchCore (基于特征建模)
# ================================================================================
# 原理: 使用预训练 CNN 提取局部特征，构建记忆库存储正常样本特征。
#       测试时通过计算测试样本特征与记忆库的最近邻距离来判断异常。
#
# 特点: 工业界目前效果最好的方法，无需训练，推理速度最快
# ================================================================================

dataset:
  name: mvtec
  format: mvtec
  path: ./data/processed/my_product    # 修改为你的数据路径
  category: my_product                  # 修改为你的产品类别
  task: segmentation
  image_size: [224, 224]
  train_batch_size: 8
  eval_batch_size: 8
  num_workers: 4

model:
  name: patchcore
  backbone: wide_resnet50_2            # 预训练骨干网络
  pre_trained: true
  layers:
    - layer2
    - layer3
  coreset_sampling_ratio: 0.01         # 核心集采样率
  num_neighbors: 9                     # KNN 邻居数

trainer:
  max_epochs: 1                        # 无需训练，仅构建记忆库
  accelerator: auto
  devices: 1

# 必须输出的 4 个硬性指标
metrics:
  image:
    - AUROC                           # 图像级 AUROC
    - AUPR                            # 图像级 AUPR
  pixel:
    - AUROC                           # 像素级 AUROC
    - PRO                             # Per-Region Overlap
  threshold:
    method: adaptive

project:
  seed: 42
  path: ./results
  default_root_dir: results/patchcore

# ================================================================================
# 算法 2: PatchCore (基于特征建模) - Anomalib 2.x 配置
# ================================================================================
# 原理: 使用预训练 CNN 提取局部特征，构建记忆库存储正常样本特征。
#       测试时通过计算测试样本特征与记忆库的最近邻距离来判断异常。
#
# 特点: 工业界目前效果最好的方法，无需训练，推理速度最快
# ================================================================================

# 数据配置 (Anomalib 2.x 格式)
data:
  class_path: anomalib.data.MVTec
  init_args:
    root: ./data
    category: bottle
    image_size: [256, 256]
    train_batch_size: 32
    eval_batch_size: 32
    num_workers: 0  # Windows 设为 0 避免多进程问题

# 模型配置 (Anomalib 2.x 格式)
model:
  class_path: anomalib.models.Patchcore
  init_args:
    backbone: wide_resnet50_2
    layers:
      - layer2
      - layer3
    pre_trained: true
    coreset_sampling_ratio: 0.1
    num_neighbors: 9

# 归一化配置
normalization:
  normalization_method: min_max

# 指标配置
metrics:
  image:
    - F1Score
    - AUROC
    - AUPR
  pixel:
    - F1Score
    - AUROC
  threshold:
    class_path: anomalib.metrics.F1AdaptiveThreshold
    init_args:
      default_value: 0.5

# 可视化配置
visualization:
  show_images: false
  save_images: false
  log_images: false
  image_save_path: null
  mode: full

# 项目配置
project:
  seed: 0
  path: ./results
  unique_dir: false

# 日志配置
logging:
  logger: []
  log_graph: false

# 训练器配置 (Lightning 格式)
trainer:
  enable_checkpointing: true
  default_root_dir: results/patchcore
  gradient_clip_val: 0
  gradient_clip_algorithm: norm
  num_nodes: 1
  devices: 1
  enable_progress_bar: true
  overfit_batches: 0.0
  track_grad_norm: -1
  check_val_every_n_epoch: 999
  fast_dev_run: false
  accumulate_grad_batches: 1
  max_epochs: 1
  min_epochs: null
  max_steps: -1
  min_steps: null
  max_time: null
  limit_train_batches: 1.0
  limit_val_batches: 0
  limit_test_batches: 1.0
  limit_predict_batches: 1.0
  val_check_interval: 999
  log_every_n_steps: 50
  accelerator: auto
  strategy: null
  sync_batchnorm: false
  num_sanity_val_steps: 0
